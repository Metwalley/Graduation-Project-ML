services:

  # ── UNIFIED AI ENGINE (the only public service) ────────────────────────────
  ai-engine:
    image: metwalley/ai-engine:latest   # pull from Docker Hub
    container_name: ai-engine
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama-3.3-70b-versatile
      - TRACKER_JSON_PATH=/seed_data/monthly_tracker.json
    volumes:
      - ./seed_data:/seed_data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
